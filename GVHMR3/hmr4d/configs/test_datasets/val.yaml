amass:
  _target_: hmr4d.dataset.pure_motion.g1_amass.G1AmassPthDataset
  data_dir: "g1_paired/val"
  pth_path: "smplxpose_v2.pth"
  g1_subdir: "g1_val"
  amass_fps: 30.0
  # 与 train 同口径: x,y 必须 LSQ 系数 ∈ [0.7, 1.05]; z 不限
  ratio_lo: [0.7, 0.7, -.inf]
  ratio_hi: [1.05, 1.05, .inf]
  ratio_thr: 0.1
  skip_substrings: ["weiz"]   # Weizmann (skip_moyo=True 时会自动追加 moyo_smplxn)
